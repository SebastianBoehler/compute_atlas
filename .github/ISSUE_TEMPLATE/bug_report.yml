name: Bug report
description: Report a defect in the dashboard, API, worker, methodology, or publication flow.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include exact steps, commands, or API requests.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - Public API
        - Worker pipeline
        - Provider adapter
        - Methodology
        - Solana publisher
        - Database
    validations:
      required: true
