name: Feature request
description: Propose a new feature for the open-source core or hosted layers.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the preferred solution.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust and transparency impact
      description: Explain how this affects verifiability, provenance, or user trust.
