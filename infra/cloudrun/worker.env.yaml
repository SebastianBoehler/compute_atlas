NODE_ENV: production
LOG_LEVEL: info
DATABASE_URL: postgres://REPLACE
TIMESCALE_ENABLED: 'true'
ENABLE_PUBLICATIONS: 'false'
SOLANA_RPC_URL: https://api.devnet.solana.com
SOLANA_RPC_WS_URL: wss://api.devnet.solana.com
SOLANA_KEYPAIR_PATH: ./data/solana/devnet-keypair.json
SOLANA_AIRDROP_MIN_BALANCE_SOL: '0.25'
SOLANA_AIRDROP_TARGET_BALANCE_SOL: '1'
SOLANA_COMMITMENT: confirmed
SOLANA_PUBLISHER_LABEL: compute-atlas-mvp
SOLANA_MEMO_MAX_BYTES: '512'
PIPELINE_DEFAULT_SYMBOLS: H100_GLOBAL_ON_DEMAND,H100_GLOBAL_SPOT,A100_GLOBAL_ON_DEMAND,A100_GLOBAL_SPOT,H200_GLOBAL_ON_DEMAND,H200_GLOBAL_SPOT
PUBLISH_SYMBOLS: ''
