services:
  db:
    image: postgres:16-alpine
    container_name: compute-atlas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: compute_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d compute_atlas']
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: compute-atlas-web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/compute_atlas
      APP_BASE_URL: http://localhost:3000
    ports:
      - '3000:3000'

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: compute-atlas-worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/compute_atlas
    command:
      [
        "sh",
        "-lc",
        "pnpm db:migrate && pnpm db:seed && while true; do pnpm --filter @compute-atlas/worker worker:pipeline || true; sleep 300; done"
      ]

volumes:
  postgres-data:
